version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: traderneuron
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/traderneuron
    volumes:
      - .:/app

  celery:
    build: .
    command: celery -A app.worker worker --loglevel=info
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

